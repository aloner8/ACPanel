services:
  postgres:
    image: postgres:17
    container_name: acpanel-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: acpanel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../../postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d acpanel"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:22-alpine
    container_name: acpanel-api-dev
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/acpanel?schema=public
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 1d
    command: >
      sh -c "npm ci && npm run prisma:generate && npm run prisma:deploy -w @acpanel/api && npm run dev -w @acpanel/api"
    ports:
      - "3000:3000"
    volumes:
      - ../..:/workspace
      - node_modules_api:/workspace/node_modules

  web:
    image: node:22-alpine
    container_name: acpanel-web-dev
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      - api
    command: >
      sh -c "npm ci && npm run start -w @acpanel/web"
    ports:
      - "4200:4200"
    volumes:
      - ../..:/workspace
      - node_modules_web:/workspace/node_modules

  web-prod:
    image: nginx:alpine
    container_name: acpanel-web-prod
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "888:80"
    volumes:
      - ../../apps/web/dist/web/browser:/usr/share/nginx/html:ro

volumes:
  node_modules_api: {}
  node_modules_web: {}
