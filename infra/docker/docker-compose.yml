services:
  postgres:
    image: postgres:17
    container_name: acpanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: acpanel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../../postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d acpanel"]
      interval: 10s
      timeout: 5s
      retries: 5
